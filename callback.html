<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TikTok Authorization Code</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
           max-width: 640px; margin: 3rem auto; padding: 0 1.25rem; line-height: 1.6; color: #1a1a1a; }
    h1 { font-size: 1.4rem; }
    code { display: block; background: #f3f3f3; padding: 1rem; border-radius: 6px;
           word-break: break-all; font-size: 1.05rem; margin: 1rem 0; }
    button { padding: .55rem 1.1rem; font-size: 1rem; border: 0; border-radius: 6px;
             background: #0b5cab; color: #fff; cursor: pointer; }
    .muted { color: #666; font-size: .9rem; }
    .err { color: #b00020; }
  </style>
</head>
<body>
  <h1>TikTok authorization code</h1>
  <p>Copy this code and paste it back into the terminal where <code style="display:inline;padding:.1rem .3rem">tiktok-auth</code> is waiting:</p>
  <code id="code">No <strong>code</strong> found in the URL.</code>
  <button id="copy">Copy code</button>
  <p id="state" class="muted"></p>
  <script>
    const p = new URLSearchParams(location.search);
    const codeEl = document.getElementById('code');
    const err = p.get('error') || p.get('errCode');
    if (err) {
      codeEl.classList.add('err');
      codeEl.textContent = 'ERROR: ' + err + ' ' + (p.get('error_description') || p.get('error_string') || '');
    } else if (p.get('code')) {
      codeEl.textContent = p.get('code');
    }
    const s = p.get('state');
    if (s) document.getElementById('state').textContent = 'state: ' + s;
    document.getElementById('copy').onclick = () =>
      navigator.clipboard.writeText(codeEl.textContent);
  </script>
</body>
</html>
